<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>pilares.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lilac-50:#faf7fc; --lilac-100:#f1e8f7; --lilac-200:#e3d2ef;
    --purple-400:#b088cc; --purple-500:#9066b3; --purple-600:#744f94; --purple-700:#5a3c74;
    --ink:#3a2c48; --ink-soft:#6b5d7c; --line:#e6d9ef; --card:#ffffff;
    --verde:#6fae70; --verde-bg:#e6f2e6;
    --vermelho:#d9756a; --vermelho-bg:#faeae8;
    --amarelo:#dba24a; --amarelo-bg:#faf1e0;
    --neutro:#e6d9ef;
    --shadow:0 8px 30px -12px rgba(122,79,148,0.25);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Outfit', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, var(--lilac-100) 0%, transparent 45%),
      radial-gradient(circle at 100% 20%, var(--lilac-200) 0%, transparent 40%),
      var(--lilac-50);
    color:var(--ink); min-height:100vh; padding-bottom:90px;
  }
  .wrap{max-width:540px; margin:0 auto; padding:18px 16px 8px;}
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:600; margin:0;}
  .top{display:flex; align-items:baseline; justify-content:space-between; padding:6px 4px 16px;}
  .brand{font-family:'Fraunces', serif; font-style:italic; font-weight:500; font-size:1.4rem; color:var(--purple-700);}
  .datebox{font-size:.78rem; color:var(--ink-soft); text-align:right;}

  .hero{
    background:linear-gradient(155deg, var(--purple-500), var(--purple-700));
    border-radius:26px; padding:22px; color:#fff; margin-bottom:16px; box-shadow:var(--shadow);
    position:relative; overflow:hidden;
  }
  .hero::before{content:""; position:absolute; inset:0; background:radial-gradient(circle at 90% -10%, rgba(255,255,255,.25), transparent 55%);}
  .hero .eyebrow{font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; opacity:.85; font-weight:500;}
  .hero .pct{font-size:2.4rem; font-family:'Fraunces'; font-weight:600; margin:4px 0;}
  .hero .subtxt{font-size:.82rem; opacity:.9;}
  .hero-bar{height:8px; background:rgba(255,255,255,.25); border-radius:20px; margin-top:14px; overflow:hidden;}
  .hero-bar-fill{height:100%; background:#fff; border-radius:20px; transition:width .4s ease;}

  .tabbar-top{display:flex; gap:6px; margin-bottom:16px; background:var(--lilac-100); padding:5px; border-radius:16px;}
  .tabtop{flex:1; text-align:center; padding:9px 4px; border-radius:12px; border:none; background:none; font-family:'Outfit'; font-weight:600; font-size:.82rem; color:var(--ink-soft); cursor:pointer;}
  .tabtop.active{background:#fff; color:var(--purple-700); box-shadow:0 2px 8px -2px rgba(122,79,148,.25);}

  .view{display:none;}
  .view.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .pillars-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .pcard{
    background:var(--card); border-radius:18px; padding:14px; border:2px solid var(--line); cursor:pointer;
    transition:transform .12s ease;
  }
  .pcard:active{transform:scale(0.97);}
  .pcard.st-feito{border-color:var(--verde); background:var(--verde-bg);}
  .pcard.st-nao{border-color:var(--vermelho); background:var(--vermelho-bg);}
  .pcard.st-pausa{border-color:var(--amarelo); background:var(--amarelo-bg);}
  .pcard .pic{font-size:1.3rem; margin-bottom:6px; display:block;}
  .pcard .plabel{font-weight:600; font-size:.88rem; margin-bottom:3px;}
  .pcard .pstatus{font-size:.7rem; color:var(--ink-soft); font-weight:500;}
  .pcard.st-feito .pstatus{color:var(--verde);}
  .pcard.st-nao .pstatus{color:var(--vermelho);}
  .pcard.st-pausa .pstatus{color:var(--amarelo);}

  .card{background:var(--card); border-radius:20px; padding:18px; margin-bottom:14px; border:1px solid var(--line); box-shadow:0 4px 18px -10px rgba(122,79,148,.18);}
  .card h3{font-size:1rem; color:var(--purple-700); margin-bottom:12px;}

  .weekrow{margin-bottom:16px;}
  .weekrow:last-child{margin-bottom:0;}
  .weekrow-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .weekrow-head .wlabel{font-weight:600; font-size:.85rem;}
  .weekrow-head .wfrac{font-size:.75rem; color:var(--ink-soft); font-weight:600;}
  .dots{display:flex; gap:6px;}
  .dot-col{flex:1; text-align:center;}
  .dot-col .dl{font-size:.62rem; color:var(--ink-soft); margin-bottom:3px; display:block;}
  .dot{width:100%; aspect-ratio:1; border-radius:8px; background:var(--neutro);}
  .dot.feito{background:var(--verde);}
  .dot.nao{background:var(--vermelho);}
  .dot.pausa{background:var(--amarelo);}

  .nav-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .nav-btn{background:var(--lilac-100); border:none; color:var(--purple-600); width:32px; height:32px; border-radius:10px; font-size:1rem; cursor:pointer;}
  .nav-title{font-weight:600; font-size:.92rem; color:var(--purple-700);}

  .heatmap{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:6px;}
  .hm-day-label{font-size:.62rem; color:var(--ink-soft); text-align:center; margin-bottom:2px;}
  .hm-cell{aspect-ratio:1; border-radius:7px; background:var(--neutro); font-size:.62rem; color:var(--ink-soft); display:flex; align-items:center; justify-content:center;}
  .hm-lvl-0{background:var(--neutro);}
  .hm-lvl-1{background:#f3c9c3;}
  .hm-lvl-2{background:#f0d9a8;}
  .hm-lvl-3{background:#c9e0c0;}
  .hm-lvl-4{background:var(--verde); color:#fff;}

  .stat-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:.85rem;}
  .stat-row:last-child{border-bottom:none;}
  .stat-row .sname{font-weight:500;}
  .stat-row .sval{color:var(--purple-600); font-weight:600;}

  .modal-overlay{position:fixed; inset:0; background:rgba(58,44,72,.45); display:none; align-items:flex-end; z-index:100;}
  .modal-overlay.active{display:flex;}
  .modal{background:#fff; width:100%; border-radius:26px 26px 0 0; padding:22px 20px calc(24px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;}
  .modal h3{color:var(--purple-700); margin-bottom:4px; font-size:1.15rem;}
  .modal .msub{font-size:.78rem; color:var(--ink-soft); margin-bottom:18px;}
  .modal-close{display:block; margin:16px auto 0; background:none; border:none; color:var(--ink-soft); font-size:.85rem;}

  .seg{display:flex; gap:8px; margin-bottom:16px;}
  .seg-btn{flex:1; padding:12px 6px; border-radius:14px; border:1.5px solid var(--line); background:var(--lilac-50); font-family:'Outfit'; font-weight:600; font-size:.8rem; color:var(--ink-soft); cursor:pointer; text-align:center;}
  .seg-btn.sel-feito{background:var(--verde); border-color:var(--verde); color:#fff;}
  .seg-btn.sel-nao{background:var(--vermelho); border-color:var(--vermelho); color:#fff;}
  .seg-btn.sel-pausa{background:var(--amarelo); border-color:var(--amarelo); color:#fff;}

  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .tlabel{font-size:.9rem; font-weight:500;}
  .switch{width:46px; height:26px; border-radius:20px; background:var(--line); position:relative; cursor:pointer; flex-shrink:0;}
  .switch.on{background:var(--verde);}
  .switch .knob{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s ease;}
  .switch.on .knob{left:23px;}

  select, input, textarea{
    font-family:'Outfit'; font-size:.9rem; padding:11px 13px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--lilac-50); color:var(--ink); width:100%;
  }
  textarea{min-height:70px; resize:vertical;}
  select:focus, input:focus, textarea:focus{outline:none; border-color:var(--purple-400);}
  .field{margin-bottom:12px;}
  .field label{font-size:.78rem; color:var(--ink-soft); display:block; margin-bottom:5px;}
  .row2{display:flex; gap:10px;}
  .row2 > *{flex:1;}
  .btn-primary{background:var(--purple-600); color:#fff; border:none; width:100%; padding:13px; border-radius:14px; font-size:.9rem; font-family:'Outfit'; font-weight:600; cursor:pointer;}
  .btn-primary:active{background:var(--purple-700);}
  .btn-secondary{background:var(--lilac-100); color:var(--purple-700); border:none; width:100%; padding:12px; border-radius:14px; font-size:.85rem; font-family:'Outfit'; font-weight:600; cursor:pointer; margin-top:8px;}

  .water-btns{display:flex; gap:8px; margin-bottom:14px;}
  .wbtn{flex:1; background:var(--lilac-50); border:1.5px dashed var(--purple-400); border-radius:14px; padding:12px 4px; text-align:center; font-weight:600; color:var(--purple-600); cursor:pointer; font-size:.82rem;}
  .wbtn:active{background:var(--lilac-100);}

  .book-item{background:var(--lilac-50); border-radius:14px; padding:12px; margin-bottom:8px;}
  .book-item .btitle{font-weight:600; font-size:.88rem; margin-bottom:4px;}
  .book-item .bmeta{font-size:.75rem; color:var(--ink-soft); margin-bottom:8px;}
  .book-item .bbar{height:6px; background:var(--line); border-radius:10px; overflow:hidden;}
  .book-item .bbar-fill{height:100%; background:var(--purple-500);}
  .mini-link{background:none; border:none; color:var(--purple-500); font-size:.75rem; font-weight:600; cursor:pointer; padding:4px 0;}

  .cycle-list{list-style:none; padding:0; margin:14px 0;}
  .cycle-list li{display:flex; align-items:center; gap:10px; padding:7px 0; font-size:.82rem; color:var(--ink-soft); border-bottom:1px solid var(--line);}
  .cycle-list li:last-child{border-bottom:none;}
  .cycle-list li.current{color:var(--purple-700); font-weight:600;}
  .cycle-num{width:22px; height:22px; border-radius:50%; background:var(--lilac-100); color:var(--purple-600); display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; flex-shrink:0;}
  .cycle-list li.current .cycle-num{background:var(--purple-600); color:#fff;}

  .empty{color:var(--ink-soft); font-size:.85rem; text-align:center; padding:14px 0;}
  .note{font-size:.78rem; color:var(--ink-soft); line-height:1.5;}
  .tag{display:inline-block; background:var(--lilac-100); color:var(--purple-700); font-size:.68rem; padding:3px 9px; border-radius:100px; margin-bottom:8px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <div class="brand">pilares.</div>
    <div class="datebox" id="dateBox"></div>
  </div>

  <div class="tabbar-top">
    <button class="tabtop active" data-tab="hoje">Hoje</button>
    <button class="tabtop" data-tab="semana">Semana</button>
    <button class="tabtop" data-tab="mes">Mês</button>
  </div>

  <!-- HOJE -->
  <div class="view active" id="view-hoje">
    <div class="hero">
      <div class="eyebrow">Hoje</div>
      <div class="pct" id="todayPct">0%</div>
      <div class="subtxt" id="todaySub">0 de 11 pilares</div>
      <div class="hero-bar"><div class="hero-bar-fill" id="todayBar" style="width:0%"></div></div>
    </div>
    <div class="pillars-grid" id="pillarsGrid"></div>
  </div>

  <!-- SEMANA -->
  <div class="view" id="view-semana">
    <div class="card">
      <div class="nav-row">
        <button class="nav-btn" id="weekPrev">‹</button>
        <div class="nav-title" id="weekTitle"></div>
        <button class="nav-btn" id="weekNext">›</button>
      </div>
      <div id="weekRows"></div>
    </div>
  </div>

  <!-- MÊS -->
  <div class="view" id="view-mes">
    <div class="card">
      <div class="nav-row">
        <button class="nav-btn" id="monthPrev">‹</button>
        <div class="nav-title" id="monthTitle"></div>
        <button class="nav-btn" id="monthNext">›</button>
      </div>
      <p class="note" style="margin-bottom:10px;">Cada dia mostra a % geral de pilares cumpridos.</p>
      <div class="heatmap" id="heatmapLabels"></div>
      <div class="heatmap" id="heatmapGrid"></div>
    </div>
    <div class="card">
      <h3>Balanço do mês por pilar</h3>
      <div id="monthStats"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pillarModal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="msub" id="modalSub"></div>
    <div id="modalBody"></div>
    <button class="modal-close" id="btnCloseModal">Fechar</button>
  </div>
</div>

<script>
/* ================= CONFIG DOS PILARES ================= */
const PILLARS = [
  {key:'sono', label:'Sono', icon:'🌙', type:'sleep', target:7, allowPause:false},
  {key:'academia', label:'Academia', icon:'🏋️', type:'tristate', target:5, allowPause:true},
  {key:'dieta', label:'Dieta', icon:'🥗', type:'diet', target:6, allowPause:true},
  {key:'cardio', label:'Cardio', icon:'🏃', type:'cardio', target:4, allowPause:false},
  {key:'agua', label:'Água', icon:'💧', type:'water', target:7, allowPause:false},
  {key:'estudo', label:'Estudo', icon:'📚', type:'tristate_note', target:6, allowPause:true},
  {key:'idiomas', label:'Idiomas', icon:'🗣️', type:'lang', target:3, allowPause:true},
  {key:'leitura', label:'Leitura', icon:'📖', type:'reading', target:4, allowPause:true},
  {key:'quarto', label:'Quarto', icon:'🛏️', type:'room', target:7, allowPause:false},
  {key:'suplementos', label:'Suplementos', icon:'💊', type:'supplements', target:7, allowPause:false},
  {key:'cabelo', label:'Cabelo', icon:'💇‍♀️', type:'hair', target:3, allowPause:false},
];
const DIET_GOAL = {kcal:1500, prot:124, fat:45, carb:155};
const CARDIO_TYPES = ["Escada","Bicicleta","Spinning","Esteira","Esteira c/ HIIT","Outro"];
const HAIR_STEPS = [
  "Hidratação","Nutrição","Restauração e acidificação","Hidratação","Umectação","Hidratação",
  "Nutrição","Hidratação","Acidificação e hidratação","Hidratação","Umectação","Restauração"
];
const DAY_LETTERS = ["S","T","Q","Q","S","S","D"];
const DAY_NAMES = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

/* ================= DATAS ================= */
function toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return toISO(new Date()); }
// segunda=0 ... domingo=6
function mondayIndex(d){ return (d.getDay()+6)%7; }
function startOfWeek(d){ const r=new Date(d); r.setDate(d.getDate()-mondayIndex(d)); r.setHours(0,0,0,0); return r; }
function addDays(d,n){ const r=new Date(d); r.setDate(d.getDate()+n); return r; }
function getWeekDates(anchor){ const start=startOfWeek(anchor); return Array.from({length:7},(_,i)=>addDays(start,i)); }
function isFuture(d){ const t=new Date(); t.setHours(0,0,0,0); const dd=new Date(d); dd.setHours(0,0,0,0); return dd.getTime()>t.getTime(); }
function isSunday(d){ return d.getDay()===0; }

/* ================= ESTADO ================= */
function loadState(){
  let s;
  try{ s = JSON.parse(localStorage.getItem('pilaresState')||'{}'); }catch(e){ s={}; }
  if(!s.days) s.days = {};
  if(!s.books) s.books = {current:[], finished:[]};
  if(s.hairCounter===undefined) s.hairCounter = 0;
  return s;
}
let state = loadState();
function save(){ localStorage.setItem('pilaresState', JSON.stringify(state)); }
function dayData(iso){ if(!state.days[iso]) state.days[iso] = {}; return state.days[iso]; }
function pillarData(iso, key){ const d = dayData(iso); if(!d[key]) d[key] = {}; return d[key]; }

let weekOffset = 0;
let monthOffset = 0;

/* ================= STATUS POR PILAR ================= */
function pillarStatus(pillar, iso){
  const d = state.days[iso] && state.days[iso][pillar.key];
  if(!d) return 'nao';
  switch(pillar.type){
    case 'sleep': return (d.acordou && d.dormiu) ? 'feito' : 'nao';
    case 'tristate': return d.status || 'nao';
    case 'tristate_note': return d.status || 'nao';
    case 'diet': {
      if(d.pausa) return 'pausa';
      if(!d.kcal && d.kcal!==0) return 'nao';
      const kcalOk = d.kcal <= DIET_GOAL.kcal*1.1 && d.kcal >= DIET_GOAL.kcal*0.9;
      const protOk = d.prot >= DIET_GOAL.prot*0.95;
      const fatOk = d.fat!==undefined && d.fat <= DIET_GOAL.fat*1.3;
      const carbOk = d.carb!==undefined && d.carb <= DIET_GOAL.carb*1.3;
      return (d.limpo && kcalOk && protOk && fatOk && carbOk) ? 'feito' : 'nao';
    }
    case 'cardio': return (d.tipo) ? 'feito' : 'nao';
    case 'water': return (d.ml && d.ml >= 2500) ? 'feito' : 'nao';
    case 'lang': if(d.pausa) return 'pausa'; return d.done ? 'feito' : 'nao';
    case 'reading': if(d.pausa) return 'pausa'; return (d.pages>0 || d.percent>0) ? 'feito' : 'nao';
    case 'room': return d.arrumou ? 'feito' : 'nao';
    case 'supplements': return (d.creatina && d.magnesio) ? 'feito' : 'nao';
    case 'hair': return d.lavou ? 'feito' : 'nao';
    default: return 'nao';
  }
}

function fmtPct(n){ return Math.round(n); }

/* ================= RENDER: HOJE ================= */
function renderHoje(){
  document.getElementById('dateBox').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long', day:'2-digit', month:'long'});
  const iso = todayISO();
  let feito=0, pausa=0;
  PILLARS.forEach(p=>{
    const st = pillarStatus(p, iso);
    if(st==='feito') feito++;
    if(st==='pausa') pausa++;
  });
  const denom = PILLARS.length - pausa;
  const pct = denom>0 ? (feito/denom*100) : 100;
  document.getElementById('todayPct').textContent = fmtPct(pct)+'%';
  document.getElementById('todaySub').textContent = `${feito} de ${denom} pilares` + (pausa? ` (${pausa} em pausa)`:'');
  document.getElementById('todayBar').style.width = Math.min(100,pct)+'%';

  const grid = document.getElementById('pillarsGrid');
  grid.innerHTML = PILLARS.map(p=>{
    const st = pillarStatus(p, iso);
    const stTxt = st==='feito' ? 'Feito' : st==='pausa' ? 'Pausa programada' : 'Não feito';
    return `<div class="pcard st-${st}" data-key="${p.key}">
      <span class="pic">${p.icon}</span>
      <div class="plabel">${p.label}</div>
      <div class="pstatus">${stTxt}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.pcard').forEach(el=>{
    el.onclick = ()=> openPillarModal(el.dataset.key, iso);
  });
}

/* ================= RENDER: SEMANA ================= */
function renderSemana(){
  const anchor = addDays(new Date(), weekOffset*7);
  const dates = getWeekDates(anchor);
  const first = dates[0], last = dates[6];
  document.getElementById('weekTitle').textContent =
    `${first.getDate()}/${first.getMonth()+1} – ${last.getDate()}/${last.getMonth()+1}`;

  const box = document.getElementById('weekRows');
  box.innerHTML = PILLARS.map(p=>{
    let feito=0, pausa=0, applicable=0;
    dates.forEach(d=>{
      if(isFuture(d)) return;
      applicable++;
      const st = pillarStatus(p, toISO(d));
      if(st==='feito') feito++;
      if(st==='pausa') pausa++;
    });
    const denom = p.target ? p.target : applicable;
    const dotsHtml = dates.map((d,i)=>{
      if(isFuture(d)) return `<div class="dot-col"><span class="dl">${DAY_LETTERS[i]}</span><div class="dot"></div></div>`;
      const st = pillarStatus(p, toISO(d));
      return `<div class="dot-col"><span class="dl">${DAY_LETTERS[i]}</span><div class="dot ${st}"></div></div>`;
    }).join('');
    const fracTxt = p.target ? `${feito}/${p.target}${pausa?` (${pausa} pausa)`:''}` : `${feito} dia(s)`;
    return `<div class="weekrow">
      <div class="weekrow-head"><span class="wlabel">${p.icon} ${p.label}</span><span class="wfrac">${fracTxt}</span></div>
      <div class="dots">${dotsHtml}</div>
    </div>`;
  }).join('');
}

/* ================= RENDER: MÊS ================= */
function renderMes(){
  const anchor = new Date(); anchor.setDate(1); anchor.setMonth(anchor.getMonth()+monthOffset);
  const year = anchor.getFullYear(), month = anchor.getMonth();
  document.getElementById('monthTitle').textContent = `${MONTH_NAMES[month]} ${year}`;

  const firstOfMonth = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const leadBlanks = mondayIndex(firstOfMonth);

  document.getElementById('heatmapLabels').innerHTML = DAY_LETTERS.map(l=>`<div class="hm-day-label">${l}</div>`).join('');

  let cells = '';
  for(let i=0;i<leadBlanks;i++) cells += `<div class="hm-cell hm-lvl-0"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(year, month, day);
    if(isFuture(d)){ cells += `<div class="hm-cell hm-lvl-0">${day}</div>`; continue; }
    const iso = toISO(d);
    let feito=0, pausa=0;
    PILLARS.forEach(p=>{ const st=pillarStatus(p,iso); if(st==='feito')feito++; if(st==='pausa')pausa++; });
    const denom = PILLARS.length - pausa;
    const pct = denom>0 ? feito/denom*100 : 100;
    let lvl = 0;
    if(pct>=90) lvl=4; else if(pct>=70) lvl=3; else if(pct>=45) lvl=2; else if(pct>0) lvl=1; else lvl=0;
    cells += `<div class="hm-cell hm-lvl-${lvl}">${day}</div>`;
  }
  document.getElementById('heatmapGrid').innerHTML = cells;

  // estatísticas por pilar no mês
  const today = new Date();
  const isCurrentMonth = (year===today.getFullYear() && month===today.getMonth());
  const elapsedDays = isCurrentMonth ? today.getDate() : daysInMonth;

  const statsBox = document.getElementById('monthStats');
  statsBox.innerHTML = PILLARS.map(p=>{
    let feito=0, pausa=0;
    for(let day=1; day<=elapsedDays; day++){
      const iso = toISO(new Date(year,month,day));
      const st = pillarStatus(p, iso);
      if(st==='feito') feito++;
      if(st==='pausa') pausa++;
    }
    let target;
    if(p.target === 7) target = elapsedDays - pausa;
    else if(p.target) target = Math.max(1, Math.round(p.target * elapsedDays/7));
    else target = null;
    const pctTxt = target ? `${feito}/${target} (${fmtPct(feito/target*100)}%)` : `${feito} dia(s) registrados`;
    return `<div class="stat-row"><span class="sname">${p.icon} ${p.label}</span><span class="sval">${pctTxt}</span></div>`;
  }).join('');
}

/* ================= NAVEGAÇÃO DE ABAS ================= */
function showTab(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.tabtop').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  if(name==='hoje') renderHoje();
  if(name==='semana') renderSemana();
  if(name==='mes') renderMes();
}
document.querySelectorAll('.tabtop').forEach(t=> t.onclick = ()=>showTab(t.dataset.tab));
document.getElementById('weekPrev').onclick = ()=>{ weekOffset--; renderSemana(); };
document.getElementById('weekNext').onclick = ()=>{ weekOffset=Math.min(0,weekOffset+1); renderSemana(); };
document.getElementById('monthPrev').onclick = ()=>{ monthOffset--; renderMes(); };
document.getElementById('monthNext').onclick = ()=>{ monthOffset=Math.min(0,monthOffset+1); renderMes(); };

/* ================= MODAL POR PILAR ================= */
function openPillarModal(key, iso){
  const p = PILLARS.find(x=>x.key===key);
  document.getElementById('modalTitle').textContent = p.icon+' '+p.label;
  document.getElementById('modalSub').textContent = new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long', day:'2-digit', month:'long'});
  document.getElementById('modalBody').innerHTML = renderModalBody(p, iso);
  wireModalBody(p, iso);
  document.getElementById('pillarModal').classList.add('active');
}
document.getElementById('btnCloseModal').onclick = ()=>{
  document.getElementById('pillarModal').classList.remove('active');
  renderHoje();
};

function renderModalBody(p, iso){
  const d = pillarData(iso, p.key);
  switch(p.type){
    case 'sleep': return `
      <div class="toggle-row"><span class="tlabel">Acordei às 8h</span><div class="switch ${d.acordou?'on':''}" data-field="acordou"><div class="knob"></div></div></div>
      <div class="toggle-row"><span class="tlabel">Dormi à meia-noite</span><div class="switch ${d.dormiu?'on':''}" data-field="dormiu"><div class="knob"></div></div></div>
    `;
    case 'tristate': case 'tristate_note': {
      const note = p.type==='tristate_note' ? `<div class="field"><label>O que estudou / vai estudar</label><textarea id="fNote" placeholder="Ex: capítulo 4 de estatística">${d.note||''}</textarea></div>` : '';
      return `
      <div class="seg">
        <button class="seg-btn ${d.status==='feito'?'sel-feito':''}" data-status="feito">Feito</button>
        <button class="seg-btn ${d.status==='nao'?'sel-nao':''}" data-status="nao">Não feito</button>
        <button class="seg-btn ${d.status==='pausa'?'sel-pausa':''}" data-status="pausa">Pausa programada</button>
      </div>
      ${note}
    `;
    }
    case 'diet': return `
      <div class="toggle-row"><span class="tlabel">Pausa hoje (refeição livre)</span><div class="switch ${d.pausa?'on':''}" data-field="pausa"><div class="knob"></div></div></div>
      <div class="field"><label>Calorias (meta ${DIET_GOAL.kcal} kcal)</label><input type="number" id="fKcal" value="${d.kcal||''}"></div>
      <div class="row2">
        <div class="field"><label>Proteína (meta ${DIET_GOAL.prot}g)</label><input type="number" id="fProt" value="${d.prot||''}"></div>
        <div class="field"><label>Gordura (meta ${DIET_GOAL.fat}g)</label><input type="number" id="fFat" value="${d.fat||''}"></div>
      </div>
      <div class="field"><label>Carboidrato (meta ${DIET_GOAL.carb}g)</label><input type="number" id="fCarb" value="${d.carb||''}"></div>
      <div class="toggle-row"><span class="tlabel">Comi limpo hoje</span><div class="switch ${d.limpo?'on':''}" data-field="limpo"><div class="knob"></div></div></div>
    `;
    case 'cardio': return `
      <div class="field"><label>Tipo</label><select id="fTipo"><option value="">Selecione</option>${CARDIO_TYPES.map(t=>`<option value="${t}" ${d.tipo===t?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="field"><label>Tempo (minutos)</label><input type="number" id="fMin" value="${d.minutos||''}"></div>
    `;
    case 'water': {
      const ml = d.ml||0;
      return `
      <div class="field"><label>Total hoje: <b>${ml} / 2500 ml</b></label></div>
      <div class="water-btns">
        <div class="wbtn" data-add="250">+250ml</div>
        <div class="wbtn" data-add="500">+500ml</div>
        <div class="wbtn" data-add="1000">+1L</div>
      </div>
      <button class="btn-secondary" id="btnResetWater">Zerar hoje</button>
    `;
    }
    case 'lang': return `
      <div class="toggle-row"><span class="tlabel">Pausa hoje (não vou estudar idioma)</span><div class="switch ${d.pausa?'on':''}" data-field="pausa"><div class="knob"></div></div></div>
      <div class="field"><label>Idioma estudado hoje</label>
        <select id="fLang">
          <option value="">Nenhum ainda</option>
          <option value="Inglês" ${d.lang==='Inglês'?'selected':''}>Inglês</option>
          <option value="Italiano" ${d.lang==='Italiano'?'selected':''}>Italiano</option>
        </select>
      </div>
    `;
    case 'reading': return renderReadingModal(d);
    case 'room': {
      const sundayField = isSunday(new Date(iso+'T00:00:00')) ? `
        <div class="field" style="margin-top:12px;"><label>Observação da faxina geral (domingo)</label><textarea id="fFaxina" placeholder="O que foi feito na faxina...">${d.faxinaNota||''}</textarea></div>
      ` : '';
      return `
      <div class="toggle-row"><span class="tlabel">Arrumei o quarto hoje</span><div class="switch ${d.arrumou?'on':''}" data-field="arrumou"><div class="knob"></div></div></div>
      ${sundayField}
    `;
    }
    case 'supplements': return `
      <div class="toggle-row"><span class="tlabel">Creatina</span><div class="switch ${d.creatina?'on':''}" data-field="creatina"><div class="knob"></div></div></div>
      <div class="toggle-row"><span class="tlabel">Magnésio</span><div class="switch ${d.magnesio?'on':''}" data-field="magnesio"><div class="knob"></div></div></div>
    `;
    case 'hair': return renderHairModal(d);
    default: return '';
  }
}

function wireModalBody(p, iso){
  const d = pillarData(iso, p.key);
  document.querySelectorAll('#modalBody .switch').forEach(sw=>{
    sw.onclick = ()=>{
      const field = sw.dataset.field;
      d[field] = !d[field];
      save();
      sw.classList.toggle('on', d[field]);
    };
  });
  document.querySelectorAll('#modalBody .seg-btn').forEach(btn=>{
    btn.onclick = ()=>{
      d.status = btn.dataset.status;
      save();
      document.querySelectorAll('#modalBody .seg-btn').forEach(b=>b.className='seg-btn');
      btn.classList.add('sel-'+d.status);
    };
  });
  const noteEl = document.getElementById('fNote');
  if(noteEl) noteEl.addEventListener('input', ()=>{ d.note = noteEl.value; save(); });

  if(p.type==='diet'){
    ['fKcal','fProt','fFat','fCarb'].forEach((id,i)=>{
      const map = ['kcal','prot','fat','carb'];
      const el = document.getElementById(id);
      el.addEventListener('input', ()=>{ d[map[i]] = parseFloat(el.value)||0; save(); });
    });
  }
  if(p.type==='cardio'){
    const selT = document.getElementById('fTipo'), inpM = document.getElementById('fMin');
    selT.addEventListener('change', ()=>{ d.tipo = selT.value || null; save(); });
    inpM.addEventListener('input', ()=>{ d.minutos = parseFloat(inpM.value)||0; save(); });
  }
  if(p.type==='water'){
    document.querySelectorAll('.wbtn').forEach(btn=>{
      btn.onclick = ()=>{
        d.ml = (d.ml||0) + parseInt(btn.dataset.add);
        save();
        document.getElementById('modalBody').innerHTML = renderModalBody(p, iso);
        wireModalBody(p, iso);
      };
    });
    const rst = document.getElementById('btnResetWater');
    if(rst) rst.onclick = ()=>{ d.ml = 0; save(); document.getElementById('modalBody').innerHTML = renderModalBody(p, iso); wireModalBody(p, iso); };
  }
  if(p.type==='lang'){
    const sel = document.getElementById('fLang');
    sel.addEventListener('change', ()=>{ d.lang = sel.value || null; d.done = !!sel.value; save(); });
  }
  if(p.type==='room'){
    const fx = document.getElementById('fFaxina');
    if(fx) fx.addEventListener('input', ()=>{ d.faxinaNota = fx.value; save(); });
  }
  if(p.type==='reading') wireReadingModal(d, iso);
  if(p.type==='hair') wireHairModal(d, iso);
}

/* ---- LEITURA ---- */
function renderReadingModal(d){
  const current = state.books.current;
  const finished = state.books.finished;
  return `
    <div class="toggle-row"><span class="tlabel">Pausa hoje (não vou ler)</span><div class="switch ${d.pausa?'on':''}" data-field="pausa"><div class="knob"></div></div></div>
    <p class="tag" style="margin-top:12px;">Livro atual</p>
    ${current.length===0 ? '<div class="empty">Nenhum livro em andamento.</div>' : current.map((b,i)=>{
      const pct = b.totalPages ? Math.min(100, Math.round(b.pagesRead/b.totalPages*100)) : 0;
      return `<div class="book-item" data-idx="${i}">
        <div class="btitle">${b.title}</div>
        <div class="bmeta">${b.pagesRead}/${b.totalPages} páginas (${pct}%)</div>
        <div class="bbar"><div class="bbar-fill" style="width:${pct}%"></div></div>
        <button class="mini-link" data-finish="${i}">Marcar como finalizado</button>
      </div>`;
    }).join('')}
    <div class="field" style="margin-top:10px;"><label>Adicionar livro novo</label><input type="text" id="fNewBookTitle" placeholder="Título"></div>
    <div class="field"><label>Total de páginas</label><input type="number" id="fNewBookPages" placeholder="Ex: 320"></div>
    <button class="btn-secondary" id="btnAddBook">Adicionar livro</button>

    <p class="tag" style="margin-top:16px;">Registro de hoje</p>
    <div class="field"><label>Páginas lidas hoje</label><input type="number" id="fPagesToday" value="${d.pages||''}"></div>
    <div class="field"><label>Anotação (opcional)</label><textarea id="fReadNote" placeholder="O que achou do trecho...">${d.note||''}</textarea></div>

    ${finished.length>0 ? `<p class="tag" style="margin-top:16px;">Finalizados</p>` + finished.map(b=>`<div class="stat-row"><span class="sname">${b.title}</span><span class="sval">${b.finishedDate}</span></div>`).join('') : ''}
  `;
}
function wireReadingModal(d, iso){
  const pagesEl = document.getElementById('fPagesToday');
  pagesEl.addEventListener('input', ()=>{
    const val = parseInt(pagesEl.value)||0;
    d.pages = val;
    if(state.books.current[0]) state.books.current[0].pagesRead = Math.min(state.books.current[0].totalPages||9999, (state.books.current[0].pagesRead||0));
    save();
  });
  const noteEl = document.getElementById('fReadNote');
  noteEl.addEventListener('input', ()=>{ d.note = noteEl.value; save(); });

  document.getElementById('btnAddBook').onclick = ()=>{
    const title = document.getElementById('fNewBookTitle').value.trim();
    const pages = parseInt(document.getElementById('fNewBookPages').value)||0;
    if(!title){ alert('Digite o título do livro.'); return; }
    state.books.current.push({title, totalPages:pages, pagesRead:0});
    save();
    document.getElementById('modalBody').innerHTML = renderModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
    wireModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
  };
  document.querySelectorAll('[data-finish]').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.finish);
      const book = state.books.current.splice(idx,1)[0];
      state.books.finished.push({title:book.title, finishedDate: new Date().toLocaleDateString('pt-BR')});
      save();
      document.getElementById('modalBody').innerHTML = renderModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
      wireModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
    };
  });
  document.querySelectorAll('.book-item .btitle, .book-item .bmeta').forEach(()=>{});
  // permitir editar páginas lidas do livro atual diretamente somando ao registro do dia
  const bookItems = document.querySelectorAll('.book-item');
  bookItems.forEach(item=>{
    item.addEventListener('click', (e)=>{
      if(e.target.classList.contains('mini-link')) return;
      const idx = parseInt(item.dataset.idx);
      const book = state.books.current[idx];
      const val = prompt(`Página atual em "${book.title}" (de ${book.totalPages}):`, book.pagesRead);
      if(val!==null){
        book.pagesRead = Math.min(book.totalPages||9999, parseInt(val)||0);
        d.pages = Math.max(d.pages||0, 1);
        save();
        document.getElementById('modalBody').innerHTML = renderModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
        wireModalBody(PILLARS.find(p=>p.key==='leitura'), iso);
      }
    });
  });
}

/* ---- CABELO ---- */
function currentCycleStep(){ return (state.hairCounter % 12) + 1; }
function renderHairModal(d){
  const nextStep = currentCycleStep();
  const doneToday = !!d.lavou;
  return `
    <p class="note" style="margin-bottom:12px;">Ciclo rotativo de 12 lavagens (~3x/semana). A cada lavagem, o app avança pra próxima etapa automaticamente.</p>
    ${doneToday ? `
      <div class="tag" style="background:var(--verde-bg); color:var(--verde);">Lavado hoje — Etapa ${d.step}: ${HAIR_STEPS[d.step-1]}</div>
      <button class="btn-secondary" id="btnUndoWash">Desfazer lavagem de hoje</button>
    ` : `
      <div class="tag">Próxima etapa: ${nextStep} — ${HAIR_STEPS[nextStep-1]}</div>
      <button class="btn-primary" id="btnLogWash">Lavei o cabelo hoje</button>
    `}
    <ul class="cycle-list">
      ${HAIR_STEPS.map((s,i)=>`<li class="${(i+1)===(doneToday?d.step:nextStep)?'current':''}"><span class="cycle-num">${i+1}</span>${s}</li>`).join('')}
    </ul>
  `;
}
function wireHairModal(d, iso){
  const btn = document.getElementById('btnLogWash');
  if(btn) btn.onclick = ()=>{
    const step = currentCycleStep();
    state.hairCounter++;
    d.lavou = true; d.step = step; d.counterBefore = state.hairCounter-1;
    save();
    document.getElementById('modalBody').innerHTML = renderModalBody(PILLARS.find(p=>p.key==='cabelo'), iso);
    wireModalBody(PILLARS.find(p=>p.key==='cabelo'), iso);
  };
  const undo = document.getElementById('btnUndoWash');
  if(undo) undo.onclick = ()=>{
    state.hairCounter = d.counterBefore!==undefined ? d.counterBefore : Math.max(0, state.hairCounter-1);
    d.lavou = false; d.step = undefined;
    save();
    document.getElementById('modalBody').innerHTML = renderModalBody(PILLARS.find(p=>p.key==='cabelo'), iso);
    wireModalBody(PILLARS.find(p=>p.key==='cabelo'), iso);
  };
}

/* ================= INIT ================= */
renderHoje();
setInterval(()=>{ if(document.getElementById('view-hoje').classList.contains('active')) renderHoje(); }, 60000);
</script>
